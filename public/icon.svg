<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4D6BFE"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 监控脉冲线 -->
  <path d="M80 256 H160 L192 160 L240 352 L288 208 L336 304 L384 256 H432"
        stroke="#fff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"
        filter="url(#glow)" opacity="0.95"/>
  <!-- 数据点 -->
  <circle cx="192" cy="160" r="14" fill="#fff" opacity="0.9"/>
  <circle cx="240" cy="352" r="14" fill="#fff" opacity="0.9"/>
  <circle cx="288" cy="208" r="14" fill="#fff" opacity="0.9"/>
  <!-- 底部品牌标识 DS -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="64" font-weight="bold"
        fill="#fff" text-anchor="middle" opacity="0.25" letter-spacing="-2">DS</text>
</svg>
